name: metrics

on:
  workflow_dispatch: 


permissions:
  contents: write

jobs:
  build-metrics:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/productivity/requirements.txt

      - name: Run metrics collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Running collector..."
          python docs/productivity/collect_metrics.py
          echo "Collector finished. File stats:" 
          ls -lah docs/productivity/metrics.json || true
          echo "First bytes:" 
          (head -c 400 docs/productivity/metrics.json || true)


      - name: Commit updated metrics
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/productivity/metrics.json

          echo "Git status after add:" 
          git status --porcelain

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[bot] update productivity metrics" 
          echo "Committed. Pushing..."

          git push origin HEAD:${{ github.ref_name }}
