name: metrics

on:
  schedule:
    - cron: '0 3 * * 0' # domingo 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/productivity/requirements.txt

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python docs/productivity/collect_metrics.py

      - name: Commit updated metrics.json
        run: |
          if git diff --quiet -- docs/productivity/metrics.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/productivity/metrics.json
          git commit -m "[bot] update productivity metrics"
          git push

