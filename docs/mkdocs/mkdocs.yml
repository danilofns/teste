      - Sobre o Projeto: index.md
      - Sobre Nós: sobrenos.md

  - Projeto:
      - Sprint 1: prrojeto/sprint-1.md
      - Sprint 2: projeto/sprint-2.md
      - Sprint 3: projeto/sprint-3.md
      - Restrospectiva: projeto/retrospectiva.md
      - Equipe: projeto/team.md
      - Roadmap: projeto/roadmap.md

  - Requisitos:
      - Visão Geral: projeto/Requsitos.md
    
  - Frontend:
      - React: frontend/react.md

  - Backend:
      - FastAPI: backend/FastAPI.md
      - Web Scraping: backend/Scrapy.md
      - LangChain: backend/LangChain.md

docs_dir: docs
site_dir: site

extra_css:
  - stylesheets/extra.css

plugins:
  - search