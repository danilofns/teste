site_name: VeritasIA 
site_description: "Documentação oficial do VeritasIA"

theme: 
  name: material
  logo: images/logo.png
  favicon: images/favicon.ico
  custom_dir: overrides
  language: pt-BR

  palette:
    primary: custom
    accent: custom

nav:
